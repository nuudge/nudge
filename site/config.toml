# Zola config for the nudge build log.
#
# base_url must match where the site is served (used for canonical links, the
# sitemap, and internal @/ links). Deployed on Cloudflare Workers; update this if
# you attach a custom domain later.
base_url = "https://blog.nuudge.workers.dev"
title = "nudge build log"
description = "Notes from building a coding agent from scratch in Rust — phone control, multi-client co-op, and an agent that's just another client."
default_language = "en"
compile_sass = false
build_search_index = false

# Zola 0.22 groups code-highlighting under a [markdown.highlighting] sub-table
# (the old top-level highlight_code / highlight_theme keys were removed).
[markdown.highlighting]
enabled = true
theme = "dracula"
